{% extends "base.html" %}
{% block title %}Cambiar contraseña{% endblock %}
{% block content %}
<div class="page-header">
  <div class="eyebrow">Mi cuenta</div>
  <h1>Cambiar contraseña</h1>
</div>
<div class="card">
  <div class="card-body">
    <form method="POST" autocomplete="off">
      <div class="form-group">
        <label>Contraseña actual</label>
        <input type="password" name="actual" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div class="form-group">
        <label>Nueva contraseña</label>
        <input type="password" name="nueva" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label>Confirmar nueva contraseña</label>
        <input type="password" name="confirmar" placeholder="Repite la nueva contraseña" required minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Guardar nueva contraseña</button>
    </form>
  </div>
</div>
{% endblock %}

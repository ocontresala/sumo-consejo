{% extends "base.html" %}
{% block title %}Iniciar sesión{% endblock %}
{% block content %}
<div style="max-width:380px;margin:32px auto 0">
  <div style="text-align:center;margin-bottom:28px">
    <div style="font-size:44px;margin-bottom:10px">⬡</div>
    <div style="font-size:22px;font-weight:700;color:var(--navy)">Sumo Consejo</div>
    <div style="font-size:13px;color:var(--text-muted);margin-top:4px">Sistema de informes de estaca</div>
  </div>
  <div class="card">
    <div class="card-body">
      <form method="POST" autocomplete="on">
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" name="email" placeholder="nombre@estaca.org" required autofocus autocomplete="email" inputmode="email">
        </div>
        <div class="form-group" style="margin-bottom:20px">
          <label>Contraseña</label>
          <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Iniciar sesión</button>
      </form>
    </div>
  </div>
  <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--text-muted)">
    ¿Olvidaste tu contraseña? Contacta al administrador.
  </div>
</div>
{% endblock %}
